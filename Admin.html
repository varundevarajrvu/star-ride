<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR RIDE - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background: rgba(0,0,0,0.8);
            border-bottom: 2px solid #ffd700;
            padding: 15px;
        }
        .brand {
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px #ffd700;
        }
        .table-container {
            background: rgba(255,255,255,0.05);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 20px;
            margin: 30px auto;
            max-width: 900px;
        }
        h2 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
        }
        table {
            color: white;
        }
        th {
            background: #ffd700;
            color: #000;
        }
        tr:hover {
            background: rgba(255,215,0,0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <span class="brand">⭐ STAR RIDE Admin</span>
            <a href="bikes.html" class="btn btn-warning float-end">Back to Site</a>
        </div>
    </nav>

    <div class="container">
        <div class="table-container">
            <h2>📋 Registered Users</h2>
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Joined</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    <tr><td colspan="4" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();
                
                if (users.length === 0) {
                    document.getElementById('usersTable').innerHTML = '<tr><td colspan="4" class="text-center text-warning">No users registered yet!</td></tr>';
                    return;
                }
                
                let html = '';
                users.forEach((user, index) => {
                    const date = new Date(user.createdAt).toLocaleDateString();
                    html += '<tr><td>' + (index + 1) + '</td><td>' + user.name + '</td><td>' + user.email + '</td><td>' + date + '</td></tr>';
                });
                document.getElementById('usersTable').innerHTML = html;
            } catch (error) {
                document.getElementById('usersTable').innerHTML = '<tr><td colspan="4" class="text-center text-danger">Error loading users</td></tr>';
            }
        }
        loadUsers();
    </script>
</body>
</html>

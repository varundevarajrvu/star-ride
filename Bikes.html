<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Bikes — STAR RIDE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
</head>
<body>
<div class="speed-bg"></div>
<div class="grid-bg"></div>

<header class="site-header">
    <div class="header-brand">
        <a href="index.html" style="text-decoration:none;border:none;">
            <h1><span>STAR</span> RIDE</h1>
            <span class="subtitle">Premium Bike Rentals</span>
        </a>
    </div>
    <div class="header-nav">
        <a href="contact.html" class="btn btn-primary btn-sm">Contact</a>
        <a href="Admin-login.html" class="btn btn-danger btn-sm">Admin</a>
        <div class="user-menu" id="userMenu"></div>
    </div>
</header>

<div class="container">
    <div class="row g-4 mb-4" id="bikeCards">
        <div class="col-12 text-center">
            <p style="color:var(--accent);font-family:'Jost',sans-serif;font-size:.8rem;letter-spacing:3px;text-transform:uppercase;">Loading bikes...</p>
        </div>
    </div>

    <div class="card p-4 booking-summary glow-border liquid" id="bookingSection" style="display:none;">
        <h4 style="color:var(--accent);">Booking Summary</h4>
        <label class="form-label">Select Bike</label>
        <select id="rate" class="form-select mb-3">
            <option value="">Select Bike</option>
        </select>
        <label class="form-label">Number of Hours</label>
        <input type="number" id="hours" class="form-control mb-3" placeholder="Hours" min="1" value="1">
        <h5 class="text-center text-warning mb-3">Total: ₹<span id="totalAmount">0</span></h5>
        <button class="btn btn-primary w-100" onclick="showPayment()">Proceed to Payment</button>
        <h5 id="result" class="text-center mt-3"></h5>
    </div>
</div>

<!-- Bike Details Modal -->
<div class="modal fade" id="bikeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:rgba(26,26,46,0.95);border:1px solid var(--accent-border);">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle" style="color:var(--accent);"></h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <div id="modalImg" class="bike-icon" style="margin-bottom:15px;"></div>
                <p id="modalPrice" class="fs-5" style="color:var(--blue);"></p>
                <p id="modalDesc" style="color:var(--text);"></p>
                <button class="btn btn-success btn-lg w-100" onclick="addToBooking()">🚴 Ride Now</button>
            </div>
        </div>
    </div>
</div>

<!-- Ride Now Dialog -->
<div class="modal fade" id="rideModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:rgba(26,26,46,0.95);border:1px solid var(--accent-border);">
            <div class="modal-header">
                <h5 class="modal-title" style="color:var(--accent);">🚴 Ride Now</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="rideBikeImg" class="text-center mb-3"></div>
                <h4 id="rideBikeName" class="text-center" style="color:var(--accent);"></h4>
                <p id="rideBikePrice" class="text-center mb-3" style="color:var(--blue);"></p>
                
                <label class="form-label" style="color:var(--accent);">Number of Hours</label>
                <input type="number" id="rideHours" class="form-control mb-3" value="1" min="1" onchange="updateRideTotal()">
                
                <div class="text-center mb-3" style="background:var(--accent-dim);padding:15px;border-radius:10px;border:1px solid var(--accent-border);">
                    <p style="color:var(--text);margin:0;">Total Amount</p>
                    <h2 style="color:var(--blue);margin:0;">₹<span id="rideTotal">0</span></h2>
                </div>
                
                <button class="btn btn-success btn-lg w-100" onclick="proceedToPayment()">💳 Proceed to Payment</button>
            </div>
        </div>
    </div>
</div>

<!-- Payment Modal -->
<div class="modal fade" id="paymentModal" tabindex="-1" style="overflow-y:auto;">
    <div class="modal-dialog modal-dialog-centered modal-lg" style="max-height:90vh;display:flex;flex-direction:column;margin:1rem auto;">
        <div class="modal-content" style="background:rgba(26,26,46,0.95);border:1px solid var(--accent-border);max-height:calc(90vh - 2rem);overflow-y:auto;display:flex;flex-direction:column;">
            <div class="modal-header" style="flex-shrink:0;">
                <h5 class="modal-title" style="color:var(--accent);">💳 Payment</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center" style="overflow-y:auto;flex:1;padding-bottom:30px;">
                <div class="qr-code" id="qrCode" style="background:#fff;padding:10px;display:inline-block;border:2px solid var(--accent);border-radius:10px;">
                    <img src="" id="qrImage" style="max-width:200px;">
                </div>
                <p class="payment-amount" id="paymentAmount" style="color:var(--blue);font-size:24px;margin-top:15px;"></p>
                <p class="payment-note" style="color:var(--text);">Scan QR with GPay / PhonePe / Paytm</p>
                <div class="payment-status" id="paymentStatus" style="padding:10px;border-radius:5px;background:rgba(255,255,255,0.1);margin:10px 0;">
                    <span class="status-icon">📱</span>
                    <span style="color:var(--text);">Make payment and click below</span>
                </div>
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" id="paymentCheck" style="width:20px;height:20px;">
                    <label class="form-check-label" for="paymentCheck" style="color:var(--text);">
                        I have completed the payment of ₹<span id="checkAmount">0</span>
                    </label>
                </div>
                <div class="mt-2">
                    <label style="color:var(--accent);">UPI Transaction ID (from payment app):</label>
                    <input type="text" id="transactionId" class="form-control" placeholder="e.g., UPI123456789" style="background:rgba(255,255,255,0.1);border:1px solid var(--accent-border);color:#fff;">
                </div>
                <button class="btn btn-success btn-lg w-100 mt-3" id="confirmBtn" onclick="confirmPayment()">✓ I Have Paid</button>
                <button class="btn btn-secondary w-100 mt-2" data-bs-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let bikes = [];
let selectedBike = null;
let currentUser = null;

// Check user on load
function checkUser() {
    const stored = localStorage.getItem('currentUser');
    currentUser = stored ? JSON.parse(stored) : null;
    const userMenu = document.getElementById('userMenu');
    
    if (currentUser && currentUser.name) {
        // Load full profile data including profile pic
        fetch('/api/profile/' + currentUser.id)
            .then(res => res.json())
            .then(data => {
                if (data.success && data.user) {
                    const user = data.user;
                    const initial = user.name.charAt(0).toUpperCase();
                    const profilePicHtml = user.profile_pic ? 
                        `<img src="${user.profile_pic}" alt="${user.name}">` : 
                        `<span>${initial}</span>`;
                    
                    userMenu.innerHTML = `
                        <a href="profile.html" class="user-avatar" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">
                            ${profilePicHtml}
                        </a>
                        <small style="color:var(--accent);font-size:11px;margin-top:5px;display:block;text-transform:uppercase;">${user.name.split(' ')[0]}</small>
                    `;
                }
            })
            .catch(err => console.error(err));
    } else {
        userMenu.innerHTML = `<a href="login.html" class="btn btn-warning btn-sm">Login to Book</a>`;
    }
    loadBikes();
}

// Load bikes from database
async function loadBikes() {
    try {
        const response = await fetch('/api/bikes');
        bikes = await response.json();
        displayBikes();
    } catch (error) {
        document.getElementById('bikeCards').innerHTML =
            '<div class="col-12 text-center"><p class="text-danger">Failed to load bikes. Is server running?</p></div>';
    }
}

// Toggle profile dropdown
window.toggleDropdown = function(e) {
    if (e) e.stopPropagation();
    const dropdown = document.getElementById('userDropdown');
    if (dropdown) {
        dropdown.classList.toggle('show');
    }
};

// Close dropdown when clicking outside
document.addEventListener('click', function(event) {
    const dropdown = document.getElementById('userDropdown');
    const userMenu = document.getElementById('userMenu');
    if (dropdown && userMenu && !userMenu.contains(event.target)) {
        dropdown.classList.remove('show');
    }
});

// Initialize
checkUser();

// Display bikes on page
function displayBikes() {
    const cards = document.getElementById('bikeCards');
    const select = document.getElementById('rate');
    
    cards.innerHTML = '';
    select.innerHTML = '<option value="">Select Bike</option>';
    
    bikes.forEach(bike => {
        const img = bike.img ? 
            `<img src="${bike.img}" alt="${bike.name}" class="bike-img" onerror="this.parentElement.innerHTML='<div class=\\'bike-icon-fallback\\'><span class=\\'bike-letter\\'>${bike.name.charAt(0)}</span></div>'">` :
            `<div class="bike-icon-fallback"><span class="bike-letter">${bike.name.charAt(0)}</span></div>`;
        
        cards.innerHTML += `
            <div class="col-md-4">
                <div class="card bike-card p-3 text-center" onclick="openModal('${bike.name.replace(/'/g, "\\'")}')">
                    ${img}
                    <h5 style="color:var(--accent);">${bike.name}</h5>
                    <p style="color:var(--blue);">₹${bike.price} / hour</p>
                </div>
            </div>`;
        
        select.innerHTML += `<option value="${bike.price}" data-name="${bike.name}">${bike.name} - ₹${bike.price}/hr</option>`;
    });
    
    document.getElementById('bookingSection').style.display = 'block';
    initBikeObserver();
}

function initBikeObserver() {
    const io = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
            if (!entry.isIntersecting) return;
            const all = [...document.querySelectorAll('.bike-card')];
            const idx = all.indexOf(entry.target);
            setTimeout(function () { entry.target.classList.add('visible'); }, idx * 80);
            io.unobserve(entry.target);
        });
    }, { threshold: 0.08 });
    document.querySelectorAll('.bike-card').forEach(function (c) { io.observe(c); });
}

// Open bike details modal
function openModal(name) {
    if (!currentUser || !currentUser.name) {
        alert('Please login first!');
        window.location.href = 'login.html';
        return;
    }
    
    selectedBike = bikes.find(b => b.name === name);
    if (!selectedBike) return;
    
    document.getElementById('modalTitle').innerText = selectedBike.name;
    document.getElementById('modalPrice').innerText = `₹${selectedBike.price} per hour`;
    document.getElementById('modalDesc').innerText = selectedBike.description || selectedBike.desc || '';
    
    const imgDiv = document.getElementById('modalImg');
    if (selectedBike.img) {
        imgDiv.innerHTML = `<img src="${selectedBike.img}" class="img-fluid" style="max-height:200px;">`;
    } else {
        imgDiv.innerHTML = `<div class="bike-icon-fallback" style="font-size:48px;"><span class="bike-letter">${name.charAt(0)}</span></div>`;
    }
    
    new bootstrap.Modal(document.getElementById('bikeModal')).show();
}

// Add bike to booking and open ride dialog
function addToBooking() {
    if (!selectedBike) return;
    
    document.getElementById('rate').value = selectedBike.price;
    document.getElementById('hours').value = 1;
    calculateTotal();
    
    bootstrap.Modal.getInstance(document.getElementById('bikeModal')).hide();
    
    // Show ride now dialog
    const rideModal = new bootstrap.Modal(document.getElementById('rideModal'));
    document.getElementById('rideBikeName').innerText = selectedBike.name;
    document.getElementById('rideBikePrice').innerText = `₹${selectedBike.price}/hour`;
    document.getElementById('rideHours').value = 1;
    document.getElementById('rideTotal').innerText = selectedBike.price;
    
    // Show bike image in ride modal
    const rideImgDiv = document.getElementById('rideBikeImg');
    if (selectedBike.img) {
        rideImgDiv.innerHTML = `<img src="${selectedBike.img}" class="img-fluid" style="max-height:150px;border-radius:10px;">`;
    } else {
        rideImgDiv.innerHTML = `<div class="bike-icon-fallback" style="font-size:48px;"><span class="bike-letter">${selectedBike.name.charAt(0)}</span></div>`;
    }
    
    rideModal.show();
}

// Calculate total
function calculateTotal() {
    const rate = parseInt(document.getElementById('rate').value) || 0;
    const hours = parseInt(document.getElementById('hours').value) || 1;
    document.getElementById('totalAmount').innerText = rate * hours;
}

// Update ride modal total
function updateRideTotal() {
    const hours = parseInt(document.getElementById('rideHours').value) || 1;
    const price = selectedBike ? selectedBike.price : 0;
    document.getElementById('rideTotal').innerText = price * hours;
}

// Proceed to payment from ride modal
function proceedToPayment() {
    if (!selectedBike) return;
    
    const hours = parseInt(document.getElementById('rideHours').value) || 1;
    if (hours < 1) {
        alert('Please enter valid hours!');
        return;
    }
    
    document.getElementById('rate').value = selectedBike.price;
    document.getElementById('hours').value = hours;
    calculateTotal();
    
    bootstrap.Modal.getInstance(document.getElementById('rideModal')).hide();
    showPayment();
}

// Listen for hours change
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('hours').addEventListener('input', calculateTotal);
});

// Show payment modal
function showPayment() {
    const rate = parseInt(document.getElementById('rate').value);
    const hours = parseInt(document.getElementById('hours').value);
    const select = document.getElementById('rate');
    const bikeName = select.options[select.selectedIndex].dataset.name || 'Bike';
    
    if (!rate || !hours || hours < 1) {
        alert('Please select bike and enter hours!');
        return;
    }
    
    const total = rate * hours;
    const upiData = encodeURIComponent(`upi://8317448381@ybl?am=${total}&pa=8317448381@ybl&pn=STAR%20RIDE`);
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${upiData}`;
    
    document.getElementById('qrImage').src = qrUrl;
    document.getElementById('paymentAmount').innerHTML = `<span class="amount-label">Total Amount</span><br><span class="amount-value" style="color:var(--accent);font-size:28px;">₹${total}</span>`;
    document.getElementById('checkAmount').innerText = total;
    document.getElementById('paymentCheck').checked = false;
    document.getElementById('paymentStatus').innerHTML = `
        <div style="background:var(--accent-dim);padding:15px;border-radius:10px;border:1px solid var(--accent-border);">
            <p style="color:var(--accent);margin:0;">⚠️ IMPORTANT</p>
            <p style="color:var(--text);margin:5px 0;">1. Scan QR code with any UPI app</p>
            <p style="color:var(--text);margin:5px 0;">2. Complete payment of ₹${total}</p>
            <p style="color:var(--text);margin:5px 0;">3. Click "I Have Paid" only after payment</p>
        </div>
    `;
    
    currentPaymentData = { bikeName, hours, amount: total, paid: false };
    new bootstrap.Modal(document.getElementById('paymentModal')).show();
}

let currentPaymentData = null;
let paymentVerified = false;

// Confirm payment
async function confirmPayment() {
    if (!currentPaymentData || !currentUser) {
        alert('Error! Please try again.');
        return;
    }
    
    const status = document.getElementById('paymentStatus');
    const btn = document.getElementById('confirmBtn');
    const checkbox = document.getElementById('paymentCheck');
    const transactionId = document.getElementById('transactionId').value.trim();
    
    // Validation
    if (!checkbox.checked) {
        status.innerHTML = `
            <div style="background:rgba(239,68,68,.1);padding:15px;border-radius:10px;border:1px solid #EF4444;">
                <p style="color:#EF4444;margin:0;">⚠️ Please confirm you have made the payment!</p>
            </div>
        `;
        return;
    }
    
    if (!transactionId) {
        status.innerHTML = `
            <div style="background:rgba(239,68,68,.1);padding:15px;border-radius:10px;border:1px solid #EF4444;">
                <p style="color:#EF4444;margin:0;">⚠️ Please enter your UPI Transaction ID!</p>
                <p style="color:var(--text);margin:5px 0;font-size:12px;">Find it in your payment app's transaction history.</p>
            </div>
        `;
        document.getElementById('transactionId').focus();
        return;
    }
    
    if (transactionId.length < 6) {
        status.innerHTML = `
            <div style="background:rgba(239,68,68,.1);padding:15px;border-radius:10px;border:1px solid #EF4444;">
                <p style="color:#EF4444;margin:0;">⚠️ Invalid Transaction ID!</p>
                <p style="color:var(--text);margin:5px 0;font-size:12px;">Transaction ID should be at least 6 characters.</p>
            </div>
        `;
        return;
    }
    
    btn.disabled = true;
    btn.innerText = '⏳ Verifying...';
    status.innerHTML = `
        <div style="background:var(--accent-dim);padding:15px;border-radius:10px;border:1px solid var(--accent-border);text-align:center;">
            <p style="color:var(--accent);margin:0;">⏳ Verifying Transaction...</p>
            <p style="color:var(--text);margin:5px 0;font-size:12px;">TXN: ${transactionId}</p>
        </div>
    `;
    
    // Save booking with transaction ID
    try {
        const response = await fetch('/api/bookings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: currentUser.id,
                bikeName: currentPaymentData.bikeName,
                hours: currentPaymentData.hours,
                totalPrice: currentPaymentData.amount,
                transactionId: transactionId
            })
        });
        
        if (response.ok) {
            status.innerHTML = `
                <div style="background:var(--blue-dim);padding:20px;border-radius:10px;border:1px solid var(--blue);text-align:center;">
                    <p style="color:var(--blue);font-size:20px;margin:0;">✓ Payment Verified!</p>
                    <p style="color:var(--text);margin:5px 0;">TXN: ${transactionId}</p>
                    <p style="color:var(--text);margin:5px 0;">Booking confirmed successfully.</p>
                </div>
            `;
            btn.style.display = 'none';
            
            setTimeout(() => {
                bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide();
                document.getElementById('result').innerHTML = 
                    `✓ Booking Confirmed!<br>${currentPaymentData.bikeName} for ${currentPaymentData.hours} hours<br>Total: ₹${currentPaymentData.amount}`;
                document.getElementById('result').style.color = '#4895EF';
                document.getElementById('hours').value = 1;
                document.getElementById('rate').value = '';
                document.getElementById('totalAmount').innerText = '0';
                document.getElementById('transactionId').value = '';
                btn.style.display = 'block';
                btn.disabled = false;
                btn.innerText = '✓ I Have Paid';
            }, 3000);
        } else {
            throw new Error('Booking failed');
        }
    } catch (error) {
        status.innerHTML = `
            <div style="background:rgba(239,68,68,.1);padding:15px;border-radius:10px;border:1px solid #EF4444;">
                <p style="color:#EF4444;">✗ Booking failed. Please try again.</p>
            </div>
        `;
        btn.disabled = false;
        btn.innerText = 'Try Again';
    }
}

// Initialize
checkUser();
</script>

</body>
</html>

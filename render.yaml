# Render Blueprint — deploys the Star Ride Node server on the free plan.
# Docs: https://render.com/docs/blueprint-spec
# The MYSQL_* secret values are entered in the Render dashboard (sync: false),
# never committed to the repo. Point them at your Aiven MySQL database.
services:
  - type: web
    name: star-ride
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # One value only: paste your database's full connection URI here
      # (in Aiven this is the "Service URI"). Entered in the dashboard, never committed.
      - key: DATABASE_URL
        sync: false

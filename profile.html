<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — STAR RIDE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        input[type="file"] { display: none; }
        .profile-container { max-width: 820px; margin: 0 auto; }
    </style>
</head>
<body>
<div class="speed-bg"></div>
<div class="grid-bg"></div>

<header class="site-header">
    <div class="header-brand">
        <a href="index.html" style="text-decoration:none;border:none;">
            <h1><span>STAR</span> RIDE</h1>
            <span class="subtitle">My Profile</span>
        </a>
    </div>
    <nav class="header-nav">
        <a href="Bikes.html" class="btn btn-primary btn-sm">Book Bikes</a>
        <a href="Admin-login.html" class="btn btn-danger btn-sm">Admin</a>
        <div id="userBadge"></div>
    </nav>
</header>

<div class="container profile-container" style="padding-top:40px;padding-bottom:64px;">
    <!-- Profile Card -->
    <div class="profile-header mb-4">
        <div class="profile-pic" onclick="document.getElementById('fileInput').click()">
            <img id="profileImage" src="" alt="Profile" style="display:none;">
            <span id="profileInitial">?</span>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="uploadPhoto(event)">
        
        <h3 id="profileName" style="color:var(--accent);">Loading...</h3>
        <p id="profileEmail" class="text-white-50">...</p>
        
        <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:8px;">
            <button class="btn btn-warning" onclick="toggleEdit()">Edit Profile</button>
            <button class="btn btn-success" onclick="window.location.href='Bikes.html'">Book Bikes</button>
            <button class="btn btn-primary" onclick="showPasswordModal()">Change Password</button>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
        <div style="text-align:center;margin-top:12px;">
            <a href="contact.html" class="btn btn-primary">&#128222; Contact &amp; Feedback</a>
        </div>
        <div id="uploadStatus" class="mt-2"></div>
        
        <div id="editSection" class="mt-3" style="display:none;">
            <input type="text" id="editName" class="form-control mb-2" placeholder="Your Name">
            <button class="btn btn-success btn-sm" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>
    
    <!-- Change Password Modal -->
    <div class="modal fade" id="passwordModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" style="color:var(--accent);">🔐 Change Password</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label" style="color:var(--accent);">Current Password</label>
                    <input type="password" id="currentPassword" class="form-control mb-3" placeholder="Enter current password">
                    
                    <label class="form-label" style="color:var(--accent);">New Password</label>
                    <input type="password" id="newPassword" class="form-control mb-3" placeholder="Enter new password">
                    
                    <label class="form-label" style="color:var(--accent);">Confirm New Password</label>
                    <input type="password" id="confirmNewPassword" class="form-control mb-3" placeholder="Confirm new password">
                    
                    <button class="btn btn-success w-100" id="changePassBtn" onclick="changePassword()">Update Password</button>
                    <p id="passwordMsg" class="text-center mt-2"></p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Booking History -->
    <div style="display:flex;justify-content:space-between;align-items:center;" class="mb-3">
        <h4 style="font-family:'Syncopate',sans-serif;font-size:.9rem;letter-spacing:2px;color:var(--accent);margin:0;">My Booking History</h4>
        <button class="btn btn-danger btn-sm" onclick="clearHistory()">Clear History</button>
    </div>
    <div id="bookingList">
        <p class="text-white-50">Loading bookings...</p>
    </div>
</div>

<script>
let currentUser = null;

function loadProfile() {
    const stored = localStorage.getItem('currentUser');
    if (!stored) {
        window.location.href = 'login.html';
        return;
    }
    
    currentUser = JSON.parse(stored);
    document.getElementById('userBadge').innerHTML = '';
    
    fetch('/api/profile/' + currentUser.id)
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                const user = data.user;
                document.getElementById('profileName').innerText = user.name;
                document.getElementById('profileEmail').innerText = user.email;
                document.getElementById('editName').value = user.name;
                document.getElementById('profileInitial').innerText = user.name.charAt(0).toUpperCase();
                
                if (user.profile_pic) {
                    document.getElementById('profileImage').src = user.profile_pic;
                    document.getElementById('profileImage').style.display = 'block';
                    document.getElementById('profileInitial').style.display = 'none';
                }
                
                displayBookings(data.bookings);
            }
        })
        .catch(err => {
            console.error(err);
        });
}

function displayBookings(bookings) {
    const list = document.getElementById('bookingList');
    
    if (!bookings || bookings.length === 0) {
        list.innerHTML = '<p class="text-white-50">No bookings yet. <a href="Bikes.html" style="color:var(--accent);">Book a bike!</a></p>';
        return;
    }
    
    let html = '';
    bookings.forEach(b => {
        const date = new Date(b.created_at).toLocaleDateString();
        html += `
            <div class="booking-card">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5 style="color:var(--accent);">${b.bike_name}</h5>
                        <p class="mb-0 text-white-50">${date}</p>
                    </div>
                    <div class="text-end">
                        <span class="badge bg-success">${b.status}</span>
                        <p class="mb-0" style="color:var(--blue);">₹${b.total_price}</p>
                        <small class="text-white-50">${b.hours} hours</small>
                    </div>
                </div>
            </div>
        `;
    });
    
    list.innerHTML = html;
}

function toggleEdit() {
    const editSection = document.getElementById('editSection');
    editSection.style.display = editSection.style.display === 'none' ? 'block' : 'none';
}

async function saveProfile() {
    const name = document.getElementById('editName').value;
    if (!name) return;
    
    const response = await fetch('/api/update-profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id, name: name })
    });
    
    const data = await response.json();
    if (data.success) {
        currentUser.name = data.user.name;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        document.getElementById('profileName').innerText = data.user.name;
        document.getElementById('profileInitial').innerText = data.user.name.charAt(0).toUpperCase();
        toggleEdit();
        alert('Profile updated!');
    }
}

async function uploadPhoto(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    if (file.size > 2 * 1024 * 1024) {
        alert('Image too large! Max 2MB allowed.');
        return;
    }
    
    const statusDiv = document.getElementById('uploadStatus');
    statusDiv.innerHTML = '<p style="color:var(--accent);">⏳ Uploading...</p>';
    
    const reader = new FileReader();
    reader.onload = function(e) {
        const base64 = e.target.result;
        savePhoto(base64);
    };
    reader.readAsDataURL(file);
    
    async function savePhoto(base64) {
        try {
            const response = await fetch('/api/update-profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    userId: currentUser.id, 
                    profilePic: base64 
                })
            });
            
            const data = await response.json();
            console.log('Server response:', data);
            statusDiv.innerHTML = '';
            
            if (data.success) {
                document.getElementById('profileImage').src = base64;
                document.getElementById('profileImage').style.display = 'block';
                document.getElementById('profileInitial').style.display = 'none';
                statusDiv.innerHTML = '<p style="color:var(--blue);">✓ Photo saved!</p>';
            } else {
                alert('Error: ' + (data.error || 'Failed to save'));
            }
        } catch (error) {
            console.error('Error:', error);
            statusDiv.innerHTML = '<p style="color:#EF4444;">Upload failed!</p>';
            alert('Upload failed: ' + error.message);
        }
    }
}

function logout() {
    localStorage.removeItem('currentUser');
    window.location.href = 'login.html';
}

function showPasswordModal() {
    console.log('Opening password modal');
    document.getElementById('currentPassword').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmNewPassword').value = '';
    document.getElementById('passwordMsg').innerText = '';
    document.getElementById('passwordMsg').style.color = '#ffffff';
    new bootstrap.Modal(document.getElementById('passwordModal')).show();
}

async function changePassword() {
    const currentPass = document.getElementById('currentPassword').value;
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmNewPassword').value;
    const msg = document.getElementById('passwordMsg');
    const btn = document.getElementById('changePassBtn');
    
    if (!currentPass || !newPass || !confirmPass) {
        msg.innerText = '⚠ All fields required!';
        msg.style.color = '#EF4444';
        return;
    }
    
    if (newPass.length < 6) {
        msg.innerText = '⚠ New password must be 6+ characters!';
        msg.style.color = '#EF4444';
        return;
    }
    
    if (newPass !== confirmPass) {
        msg.innerText = '⚠ New passwords do not match!';
        msg.style.color = '#EF4444';
        return;
    }
    
    btn.disabled = true;
    btn.innerText = '⏳ Updating...';
    msg.innerText = 'Please wait...';
    msg.style.color = 'var(--accent)';
    
    try {
        const response = await fetch('/api/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: currentUser.id,
                currentPassword: currentPass,
                newPassword: newPass
            })
        });
        
        const data = await response.json();
        console.log('Change password response:', data);
        
        if (data.success) {
            msg.innerText = '✓ Password changed successfully!';
            msg.style.color = '#4895EF';
            btn.disabled = false;
            btn.innerText = 'Update Password';
            setTimeout(() => {
                bootstrap.Modal.getInstance(document.getElementById('passwordModal')).hide();
            }, 1500);
        } else {
            msg.innerText = '⚠ ' + (data.error || 'Failed to change password');
            msg.style.color = '#EF4444';
            btn.disabled = false;
            btn.innerText = 'Update Password';
        }
    } catch (error) {
        console.error('Error:', error);
        msg.innerText = '⚠ Error: ' + error.message;
        msg.style.color = '#EF4444';
        btn.disabled = false;
        btn.innerText = 'Update Password';
    }
}

async function clearHistory() {
    if (!confirm('Are you sure you want to clear all booking history? This cannot be undone.')) {
        return;
    }
    
    try {
        const response = await fetch('/api/bookings/' + currentUser.id, {
            method: 'DELETE'
        });
        
        const data = await response.json();
        if (data.success) {
            displayBookings([]);
            alert('Booking history cleared!');
        }
    } catch (error) {
        alert('Failed to clear history');
    }
}

loadProfile();
</script>

</body>
</html>
